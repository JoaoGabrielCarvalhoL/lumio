quarkus.oidc.enabled=false


quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER:http:faked_value}

quarkus.mailer.host=${MAILER_HOST:faked_value}
quarkus.mailer.port=${MAILER_PORT:0001}


aws.sqs.queue.url=${AWS_SQS_QUEUE_URL:faked_value}
aws.sqs.queue.keycloak-user-create=${KEYCLOAK_USER_CREATE_QUEUE_URL:faked_value}
aws.sqs.health.queues=${VIDEO_UPLOAD_QUEUE_URL:faked_value},${RESOURCE_UPLOAD_QUEUE_URL:faked_value},${KEYCLOAK_USER_CREATE_QUEUE_URL:faked_value}



quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa

quarkus.hibernate-orm.schema-management.strategy=drop-and-create